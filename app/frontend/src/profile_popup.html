<!-- Profile Popup Component (markup only; scripts live on each page) -->
<div class="profile-popup" id="profilePopup" role="dialog" aria-modal="true" aria-labelledby="profileTitle">
  <div class="popup-header">
    <h3 id="profileTitle">Profile</h3>
    <button class="close-btn" type="button" aria-label="Close profile menu" onclick="closeProfilePopup()">×</button>
  </div>
  <div class="popup-body">
    <p id="usernameDisplay">Username</p>
    <!-- You can add email/links here later -->
  </div>
  <div class="popup-actions">
    <button class="logout-btn" type="button" onclick="logout()">Logout</button>
  </div>
</div>
