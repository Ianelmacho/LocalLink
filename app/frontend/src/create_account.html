<!--
  File: create_account.html
  Description: Create Account with full-bleed London background and centered card.
-->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>FindMyGuide - Create Account</title>
  <link rel="stylesheet" href="create_account_style.css" />
</head>
<body>
  <main class="main-content">
    <section class="create-account-container" role="form" aria-labelledby="createTitle">
      <h2 class="create-account-title" id="createTitle">Create Your Account</h2>

      <form class="create-account-form" action="#" method="post" novalidate>
        <!-- First Name -->
        <label for="first-name">First Name</label>
        <input type="text" id="first-name" name="first-name" autocomplete="given-name" required />

        <!-- Last Name -->
        <label for="last-name">Last Name</label>
        <input type="text" id="last-name" name="last-name" autocomplete="family-name" required />

        <!-- Username -->
        <label for="username">Username</label>
        <input type="text" id="username" name="username" autocomplete="username" required />

        <!-- Email -->
        <label for="email">Email</label>
        <input type="email" id="email" name="email" autocomplete="email" required />

        <!-- Password -->
        <label for="password">Password</label>
        <input type="password" id="password" name="password" autocomplete="new-password" required />

        <button type="submit">Sign Up</button>
      </form>
    </section>
  </main>
</body>
</html>
