<!--
  File: create_account.html
  Description: HTML structure for the Create Account page. Includes a form for user registration.
-->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FindMyGuide - Create Account</title>
    <!-- Linking stylesheets -->
    <link rel="stylesheet" href="create_account_style.css">
</head>
<body>
    <!-- Main content area -->
    <main class="main-content">
        <section class="create-account-form">
            <h2>Create Your Account</h2>
            <form>
                <!-- First Name field -->
                <label for="first-name">First Name</label>
                <input type="text" id="first-name" name="first-name" required>

                <!-- Last Name field -->
                <label for="last-name">Last Name</label>
                <input type="text" id="last-name" name="last-name" required>

                <!-- Username field -->
                <label for="username">Username:</label>
                <input type="text" id="username" name="username" required>

                <!-- Email field -->
                <label for="email">Email:</label>
                <input type="email" id="email" name="email" required>

                <!-- Password field -->
                <label for="password">Password:</label>
                <input type="password" id="password" name="password" required>

                <!-- Submit button -->
                <button type="submit">Sign Up</button>
            </form>
        </section>
    </main>
</body>
</html>
