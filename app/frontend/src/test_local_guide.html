<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FindMyGuide - Local Guide Profile</title>
    <link rel="stylesheet" href="test_local_guide_style.css">
    <link rel="stylesheet" href="navbar_style.css">
</head>
<body>
    <nav class="navbar">
        <div class="navbar-logo-placeholder">
            <img src="../photos/Original_Logo.png" alt="FindMyGuide Logo" style="height: 100%; max-height: 80px; width: auto; object-fit: contain; border-radius: 8px;" />
        </div>
        <ul class="navbar-tabs">
            <li class="navbar-tab" onclick="window.location.href='home.html'">Local Guides</li>
            <li class="navbar-tab" onclick="window.location.href='search_guides.html'">Explore</li>
            <li class="navbar-tab" onclick="window.location.href='test_local_guide.html'">Tab 3</li>
        </ul>
    </nav>
    <div class="profile-container">
        <div class="profile-image">
            <img src="../photos/progress_updates/Welcome_Page.png" alt="Tour Guide Photo" />
        </div>
        <div class="profile-info">
            <h2>Jane Doe</h2>
            <p><strong>Location:</strong> Paradise City</p>
            <div class="hotspots">
                <strong>Hotspots:</strong>
                <span>Central Park</span>
                <span>Historic Museum</span>
                <span>Riverwalk</span>
                <span>Sunset Beach</span>
            </div>
            <button class="connect-btn">Message & Connect</button>
        </div>
    </div>
</body>
</html>
