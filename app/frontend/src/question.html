<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>FindMyGuide — Help</title>

  <!-- Site styles (keep these if this page uses your site chrome) -->
  <link rel="stylesheet" href="navbar_style.css" />
  <link rel="stylesheet" href="profile_popup_style.css" />

  <!-- Help component styles -->
  <link rel="stylesheet" href="question_style.css" />
</head>
<body>

  <!-- ===== Help FAB (icon image) ===== -->
  <!-- Replace the src below with your actual icon path -->
  <button class="help-fab" id="helpFab" aria-haspopup="dialog" aria-controls="helpModal" aria-label="Open help">
    <img src="../photos/Help_Icon.png" alt="Help" />
  </button>

  <!-- Backdrop + Modal (centered) -->
  <div class="help-backdrop" id="helpBackdrop" hidden></div>

  <div class="help-modal" id="helpModal" role="dialog" aria-modal="true" aria-labelledby="helpTitle" hidden>
    <div class="help-modal__head">
      <h2 id="helpTitle">Welcome to FindMyGuide</h2>
      <button class="help-close" id="helpClose" aria-label="Close help">×</button>
    </div>
    <div class="help-modal__body">
      <p>We have three pages for all your tour guide needs:</p>
      <ul>
        <li><strong>Local Guides</strong> — find guides near you.</li>
        <li><strong>Explore</strong> — search travel spots &amp; guides using advanced filters.</li>
        <li><strong>My Profile</strong> — customize preferences so we can match the best tours for your next trip.</li>
      </ul>
    </div>
    <div class="help-modal__actions">
      <button class="help-action" id="helpGotIt">Got it</button>
    </div>
  </div>

  <!-- Profile popup container (optional, only if navbar is present) -->
  <div id="profile-popup-container"></div>

  <!-- Scripts -->
  <script>
    /* ===== Help modal behavior (centered popup) ===== */
    const fab = document.getElementById('helpFab');
    const modal = document.getElementById('helpModal');
    const closeBtn = document.getElementById('helpClose');
    const backdrop = document.getElementById('helpBackdrop');
    const gotIt = document.getElementById('helpGotIt');

    function openHelp() {
      modal.hidden = false;
      backdrop.hidden = false;
      requestAnimationFrame(() => {
        modal.classList.add('show');
        backdrop.classList.add('show');
      });
      fab.setAttribute('aria-expanded', 'true');
    }
    function closeHelp() {
      modal.classList.remove('show');
      backdrop.classList.remove('show');
      fab.setAttribute('aria-expanded', 'false');
      setTimeout(() => { modal.hidden = true; backdrop.hidden = true; }, 220);
    }

    fab.addEventListener('click', openHelp);
    closeBtn.addEventListener('click', closeHelp);
    gotIt.addEventListener('click', closeHelp);
    backdrop.addEventListener('click', (e) => { if (e.target === backdrop) closeHelp(); });
    document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeHelp(); });

    /* ===== Optional: profile popup loader if navbar is present ===== */
    const __popupLoaded = (async () => {
      const container = document.getElementById('profile-popup-container');
      if (!container) return null;
      const res = await fetch('profile_popup.html', { cache: 'no-store' });
      container.innerHTML = await res.text();
      return document.getElementById('profilePopup');
    })();

    async function toggleProfilePopup() {
      const popup = await __popupLoaded;
      if (!popup) return;
      popup.classList.toggle('show');
      const icon = document.querySelector('.profile-icon');
      icon?.setAttribute('aria-expanded', popup.classList.contains('show') ? 'true' : 'false');
    }
    document.addEventListener('click', async (e) => {
      const popup = await __popupLoaded; const icon = document.querySelector('.profile-icon');
      if (!popup || !popup.classList.contains('show')) return;
      if (!popup.contains(e.target) && !icon.contains(e.target)) {
        popup.classList.remove('show');
        icon?.setAttribute('aria-expanded','false');
      }
    });
    function logout(){ alert('Logging out...'); window.location.href='login.html'; }
  </script>
</body>
</html>
