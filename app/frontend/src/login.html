<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>FindMyGuide – Login</title>
  <link rel="stylesheet" href="login_style.css" />
</head>
<body>
  <main class="login-shell" role="main" aria-labelledby="loginTitle">
    <h1 class="login-title" id="loginTitle">Welcome back</h1>

    <form class="login-form" id="loginForm" autocomplete="on" novalidate>
      <label for="username">Username or Email</label>
      <input type="text" id="username" name="username" inputmode="email" placeholder="you@example.com" autofocus required />

      <label for="password">Password</label>
      <input type="password" id="password" name="password" placeholder="••••••••" required />

      <label class="show-password">
        <input type="checkbox" id="togglePassword" />
        Show password
      </label>

      <a class="forgot-link" href="forgot_password.html" aria-label="Forgot your password?">Forgot password?</a>

      <button type="submit" class="primary-btn" aria-label="Log in to your account">Log In</button>
      <button type="button" class="register-btn" id="registerBtn">Create Account</button>
    </form>
  </main>

  <script>
    (function () {
      const form = document.getElementById('loginForm');
      const user = document.getElementById('username');
      const pass = document.getElementById('password');
      const toggle = document.getElementById('togglePassword');
      const registerBtn = document.getElementById('registerBtn');

      // Show/hide password via checkbox
      toggle.addEventListener('change', function () {
        pass.type = this.checked ? 'text' : 'password';
      });

      // Basic front-end validation + redirect
      form.addEventListener('submit', function (e) {
        e.preventDefault();
        const u = user.value.trim();
        const p = pass.value.trim();

        if (!u || !p) {
          const errorPopup = document.createElement('div');
          errorPopup.textContent = 'Please enter both a username and password.';
          errorPopup.className = 'error-popup';
          document.body.appendChild(errorPopup);

          setTimeout(() => { errorPopup.classList.add('visible'); }, 50);
          setTimeout(() => { errorPopup.classList.remove('visible'); }, 5000);
          setTimeout(() => { errorPopup.remove(); }, 7000);
          return;
        }
        try { localStorage.setItem('fmg_user', u); } catch (_) {}
        window.location.href = 'home.html';
      });

      registerBtn.addEventListener('click', function () {
        window.location.href = 'create_account.html';
      });
    })();
  </script>
</body>
</html>
