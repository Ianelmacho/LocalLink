<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Forgot Password</title>
  <link rel="stylesheet" href="forgot_password_style.css" />
</head>
<body>
  <main class="fp-shell">
    <section class="forgot-password-container" role="form" aria-labelledby="fpTitle">
      <h1 class="forgot-password-title" id="fpTitle">Forgot your password?</h1>
      <p class="forgot-password-sub">
        No worries—enter your email and we’ll send you a reset link.
      </p>

      <form class="forgot-password-form" action="#" method="post" novalidate>
        <label for="email">Email address</label>
        <input type="email" id="email" name="email" autocomplete="email" required />

        <button type="submit">Send reset link</button>
      </form>

      <div class="fp-actions">
        <a href="login.html" class="fp-link">Back to sign in</a>
      </div>

      <div class="logo-container" aria-hidden="true">
        <img src="../photos/Logo_Test.png" alt="Local Link logo" />
      </div>
    </section>
  </main>
</body>
</html>
