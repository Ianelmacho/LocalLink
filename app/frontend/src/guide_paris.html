<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>FindMyGuide - Emma (Paris)</title>
  <link rel="stylesheet" href="guide_common_style.css" />
  <link rel="stylesheet" href="navbar_style.css" />
  <link rel="stylesheet" href="profile_popup_style.css" />
</head>
<body>
  <!-- Navbar -->
  <nav class="navbar">
    <div class="navbar-logo-placeholder">
      <img src="../photos/Original_Logo.png" alt="FindMyGuide Logo" />
    </div>
    <ul class="navbar-tabs">
      <li class="navbar-tab" onclick="window.location.href='home.html'">Local Guides</li>
      <li class="navbar-tab" onclick="window.location.href='search_guides.html'">Explore</li>
      <li class="navbar-tab" onclick="window.location.href='featured_guides.html'">Featured</li>
    </ul>
    <div class="profile-icon" onclick="toggleProfilePopup()" aria-label="Open profile menu">
      <svg viewBox="0 0 24 24" width="30" height="30" fill="#e05260" aria-hidden="true">
        <circle cx="12" cy="8" r="4"/>
        <path d="M4 20c0-4 4-6 8-6s8 2 8 6v1H4z"/>
      </svg>
    </div>
  </nav>

  <!-- Profile popup (injected) -->
  <div id="profile-popup-container"></div>

  <!-- Main -->
  <main class="guide-profile">
    <h2>Emma – Romantic Paris</h2>

    <!-- Scrollable images -->
    <div class="image-scroll">
      <img src="../photos/Emma_Paris.png" alt="Eiffel Tower at dusk" />
      <img src="../photos/Emma_Paris2.png" alt="Montmartre streets" />
      <img src="../photos/Emma_Paris3.png" alt="Seine river cruise" />
    </div>

    <!-- Info + CTA -->
    <section class="guide-info">
      <p>
        Emma curates intimate walks through Paris — from iconic sights to cozy cafés —
        blending art, food, and history for an unforgettable day in the City of Light.
      </p>

      <div class="actions-row">
        <button class="connect-btn">Message &amp; Connect</button>
      </div>

      <!-- Favorite tour spots -->
      <div class="favorites">
        <h3>Favorite Tour Spots</h3>
        <div class="pill-row">
          <button class="pill-btn">Eiffel Tower</button>
          <button class="pill-btn">Montmartre</button>
          <button class="pill-btn">Louvre</button>
          <button class="pill-btn">Seine Cruise</button>
          <button class="pill-btn">Le Marais</button>
          <button class="pill-btn">Notre-Dame</button>
        </div>
      </div>

      <!-- More in Paris -->
      <div class="more-link">
        <a href="search_guides.html?city=Paris">More tour guides in Paris →</a>
      </div>
    </section>
  </main>

  <script>
    fetch('profile_popup.html')
      .then((res) => res.text())
      .then((html) => { document.getElementById('profile-popup-container').innerHTML = html; });
  </script>
  <script>
  // Load the popup HTML once and keep a promise so we can await it on first toggle
  const __popupLoaded = (async () => {
    const container = document.getElementById('profile-popup-container') || (() => {
      const div = document.createElement('div');
      div.id = 'profile-popup-container';
      document.body.appendChild(div);
      return div;
    })();
    const res = await fetch('profile_popup.html', { cache: 'no-store' });
    const html = await res.text();
    container.innerHTML = html;
    // Return the element for convenience
    return document.getElementById('profilePopup');
  })();

  // Open/Close helpers (exposed globally so onclick can find them)
  async function toggleProfilePopup() {
    const popup = await __popupLoaded;
    const isOpen = popup.classList.contains('show');
    if (isOpen) {
      closeProfilePopup();
    } else {
      openProfilePopup();
    }
  }

  async function openProfilePopup() {
    const popup = await __popupLoaded;
    popup.classList.add('show');
    const icon = document.querySelector('.profile-icon');
    icon && icon.setAttribute('aria-expanded', 'true');
  }

  async function closeProfilePopup() {
    const popup = await __popupLoaded;
    popup.classList.remove('show');
    const icon = document.querySelector('.profile-icon');
    icon && icon.setAttribute('aria-expanded', 'false');
  }

  // Close when clicking outside
  document.addEventListener('click', async (e) => {
    const popup = await __popupLoaded;
    const icon = document.querySelector('.profile-icon');
    if (!popup.classList.contains('show')) return;
    if (!popup.contains(e.target) && !icon.contains(e.target)) {
      closeProfilePopup();
    }
  });

  // Optional: Esc key closes the popup
  document.addEventListener('keydown', async (e) => {
    if (e.key === 'Escape') closeProfilePopup();
  });

  // Required by the markup; keep as no-op until you want to add real auth
  function logout() {
      window.location.href = 'login.html';
    }
</script>
</body>
</html>
